services:
  api:
    image: ghcr.io/deps-makers/deps-eto/api:latest
    build:
      context: ./api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      DEPS_HOME_DOMAIN: ${DEPS_HOME_DOMAIN}
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "4001:3000"
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - deps-home-net

  frontend:
    image: ghcr.io/deps-makers/deps-eto/frontend:latest
    build:
      context: ./frontend
      target: prod
    ports:
      - "6173:80"
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: deps-home-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - deps-home-net

volumes:
  db-data:

networks:
  deps-home-net:
