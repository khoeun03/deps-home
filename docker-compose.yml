services:
  api:
    image: ghcr.io/khoeun03/deps-home/api:latest
    build:
      context: ./api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      DATABASE_URL: ${DATABASE_URL:-postgres://deps_user:deps_pass@db:5432/deps_home_db}
      DEPS_HOME_DOMAIN: ${DEPS_HOME_DOMAIN}
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "4001:3001"
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - deps-home-net

  frontend:
    image: ghcr.io/khoeun03/deps-home/frontend:latest
    build:
      context: ./frontend
      target: prod
    ports:
      - "6173:80"
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: deps-home-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deps_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deps_pass}
      POSTGRES_DB: ${POSTGRES_DB:-deps_home_db}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - deps-home-net

volumes:
  db-data:

networks:
  deps-home-net:
